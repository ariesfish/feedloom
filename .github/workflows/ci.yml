name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Verify pnpm
        run: npx --yes pnpm@10.33.2 --version

      - name: Install dependencies
        run: npx --yes pnpm@10.33.2 install --frozen-lockfile

      - name: Typecheck
        run: npx --yes pnpm@10.33.2 typecheck

      - name: Test
        run: npx --yes pnpm@10.33.2 test

      - name: Build
        run: npx --yes pnpm@10.33.2 build
