name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          npm install --prefix "$RUNNER_TEMP/pnpm" pnpm@10.33.2
          echo "PNPM=$RUNNER_TEMP/pnpm/node_modules/.bin/pnpm" >> "$GITHUB_ENV"
          "$RUNNER_TEMP/pnpm/node_modules/.bin/pnpm" --version

      - name: Install dependencies
        run: "$PNPM" install --frozen-lockfile

      - name: Typecheck
        run: "$PNPM" typecheck

      - name: Test
        run: "$PNPM" test

      - name: Build
        run: "$PNPM" build
