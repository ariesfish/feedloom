name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify pnpm
        run: npx --yes pnpm@10.33.2 --version

      - name: Install dependencies
        run: npx --yes pnpm@10.33.2 install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Typecheck
        run: npx --yes pnpm@10.33.2 typecheck

      - name: Test
        run: npx --yes pnpm@10.33.2 test

      - name: Build
        run: npx --yes pnpm@10.33.2 build

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
