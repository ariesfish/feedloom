[match]
host_suffixes = ["www.eia.gov"]

[extract]
selectors = ["[class*=\"tie-article\"]"]

[metadata]
strip_title_regexes = ["\\s*-\\s*U\\.S\\. Energy Information Administration \\(EIA\\)\\s*$"]

[clean.remove]
class_contains = ["do-not-print", "tie-archive-section"]
exact_text = ["In-brief analysis"]
text_regexes = ["^## \\[.+\\]\\(#\\)$", "^\\*\\*Principal contributor:\\*\\*.*$"]
