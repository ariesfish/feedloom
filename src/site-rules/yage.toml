[match]
host_suffixes = ["yage.ai"]

[extract]
selectors = ["[class*=\"entry-content\"]", "body"]

[metadata]
author_meta_names = ["author"]
author_selectors = ["[class*=\"url fn\"]"]
strip_title_regexes = ["\\s*\\|\\s*Computing Life\\s*$"]

[clean.remove]
selectors = ["#title-block-header"]
class_contains = ["site-nav", "article-tags"]

[clean.truncate]
after_contains = ["鸭哥每日手记", "本文 100% 由 AI 生成", "## Comments", "### Comments", "Please enable JavaScript to view the"]
